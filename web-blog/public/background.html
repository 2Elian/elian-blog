<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elian 星辰大海 · 行星环宇</title>
    <style>
        /* 深邃太空底色 */
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020210;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* 粒子画布位于底层 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 主容器 */
        .hero-grid {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ==============================================
           星云光斑（柔和宇宙云气）
           ============================================== */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            will-change: transform;
            animation: floatNebula 18s infinite alternate ease-in-out;
            mix-blend-mode: screen;
        }

        .nebula-1 {
            width: 70vw;
            height: 70vw;
            max-width: 900px;
            max-height: 900px;
            background: radial-gradient(circle, #1e3a5f 0%, transparent 70%);
            top: -15%;
            left: -10%;
            animation-duration: 20s;
        }

        .nebula-2 {
            width: 80vw;
            height: 80vw;
            max-width: 1000px;
            max-height: 1000px;
            background: radial-gradient(circle, #2a1a4a 0%, transparent 70%);
            bottom: -20%;
            right: -12%;
            animation-duration: 22s;
            animation-delay: -6s;
        }

        .nebula-3 {
            width: 60vw;
            height: 60vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle, #0f2b3d 0%, transparent 70%);
            top: 45%;
            left: 40%;
            opacity: 0.35;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        /* ==============================================
           行星样式（木星、地球、月球）
           ============================================== */
        .planet {
            position: absolute;
            border-radius: 50%;
            will-change: transform;
            animation: floatPlanet 24s infinite alternate ease-in-out;
            box-shadow: 0 0 30px rgba(100, 150, 255, 0.3), inset 0 -10px 20px rgba(0,0,0,0.5);
        }

        /* 行星浮动动画（比星云稍慢，幅度更大） */
        @keyframes floatPlanet {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(25px, -45px) scale(1.03);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.97);
            }
            100% {
                transform: translate(15px, -25px) scale(1.01);
            }
        }

        /* 木星 */
        .jupiter {
            width: 130px;
            height: 130px;
            top: 15%;
            right: 20%;
            background: radial-gradient(circle at 30% 30%, #d4a373, #8b5a2b 50%, #4a2e15 80%),
            repeating-linear-gradient(0deg, rgba(210, 160, 100, 0.4) 0px, rgba(210, 160, 100, 0.4) 6px,
                    rgba(180, 120, 60, 0.3) 6px, rgba(180, 120, 60, 0.3) 12px);
            animation-duration: 28s;
            animation-delay: -3s;
        }

        /* 地球 */
        .earth {
            width: 85px;
            height: 85px;
            bottom: 20%;
            left: 15%;
            background: radial-gradient(circle at 40% 40%, #4da6ff, #0066cc 60%, #001a33 90%),
            radial-gradient(circle at 60% 30%, #66cc66 8%, transparent 12%),
            radial-gradient(circle at 25% 70%, #66cc66 6%, transparent 10%),
            radial-gradient(circle at 70% 60%, #ffffff 4%, transparent 7%),
            radial-gradient(circle at 30% 45%, #ffffff 3%, transparent 6%);
            animation-duration: 22s;
            animation-delay: -8s;
        }

        /* 月球 */
        .moon {
            width: 60px;
            height: 60px;
            top: 55%;
            left: 28%;
            background: radial-gradient(circle at 35% 35%, #e0e0e0, #888888 70%, #444444 100%),
            radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3) 2%, transparent 6%),
            radial-gradient(circle at 20% 60%, rgba(0,0,0,0.4) 5%, transparent 10%),
            radial-gradient(circle at 70% 30%, rgba(255,255,255,0.2) 3%, transparent 7%);
            animation-duration: 20s;
            animation-delay: -12s;
            box-shadow: 0 0 25px rgba(200,200,200,0.4), inset 0 -6px 12px rgba(0,0,0,0.6);
        }

        /* 星环（所有行星共用，通过伪元素实现） */
        .planet::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg) rotateY(20deg);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2), inset 0 0 8px rgba(255,255,255,0.15);
            animation: ringPulse 8s infinite alternate ease-in-out;
            pointer-events: none;
        }

        /* 木星环（薄而宽） */
        .jupiter::after {
            width: 170px;
            height: 170px;
            border-width: 3px;
            border-color: rgba(210, 180, 140, 0.4);
            box-shadow: 0 0 20px rgba(210, 180, 140, 0.3);
        }

        /* 地球环（纤细科技蓝） */
        .earth::after {
            width: 115px;
            height: 115px;
            border-width: 1.5px;
            border-color: rgba(100, 180, 255, 0.5);
            box-shadow: 0 0 18px rgba(0, 180, 255, 0.4);
        }

        /* 月球环（细碎冰晶感） */
        .moon::after {
            width: 85px;
            height: 85px;
            border-width: 1px;
            border-style: dashed;
            border-color: rgba(220, 220, 255, 0.5);
            box-shadow: 0 0 12px rgba(200, 200, 255, 0.3);
            animation: ringPulse 5s infinite alternate ease-in-out;
        }

        @keyframes ringPulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) rotateX(75deg) rotateY(20deg) scale(1); }
            100% { opacity: 0.9; transform: translate(-50%, -50%) rotateX(75deg) rotateY(20deg) scale(1.02); }
        }

        /* ==============================================
           星光小点
           ============================================== */
        .star-dot {
            position: absolute;
            border-radius: 50%;
            background: #b0e0ff;
            box-shadow: 0 0 12px #7bb3d9, 0 0 25px rgba(100, 150, 255, 0.5);
            animation: twinkle 10s infinite alternate ease-in-out;
        }

        .dot-1 {
            width: 8px;
            height: 8px;
            top: 28%;
            left: 18%;
            background: #c4d2ff;
            box-shadow: 0 0 18px #92a8d1, 0 0 30px rgba(146, 168, 209, 0.6);
            animation-duration: 8s;
        }

        .dot-2 {
            width: 5px;
            height: 5px;
            top: 72%;
            right: 18%;
            background: #ffe0b0;
            box-shadow: 0 0 15px #d9b382, 0 0 25px rgba(217, 179, 130, 0.5);
            animation-duration: 12s;
            animation-delay: -3s;
        }

        .dot-3 {
            width: 6px;
            height: 6px;
            bottom: 25%;
            left: 55%;
            background: #c9e4ff;
            box-shadow: 0 0 14px #8ba9c4, 0 0 22px rgba(139, 169, 196, 0.6);
            animation-duration: 14s;
            animation-delay: -5s;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.6); }
        }

        /* ==============================================
           鼠标跟随光晕
           ============================================== */
        .cursor-glow {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(173, 200, 255, 0.12) 0%, transparent 70%);
            filter: blur(70px);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        /* 滑动的星轨光线 */
        .star-trail {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4a6fa5, #b0c4de, transparent);
            animation: slideLine 8s linear infinite;
            filter: blur(2px);
            opacity: 0.5;
        }

        .star-trail-2 {
            top: 0;
            bottom: auto;
            animation-duration: 12s;
            background: linear-gradient(90deg, transparent, #5c4a7a, #9b8ec4, transparent);
            animation-delay: -4s;
        }

        @keyframes slideLine {
            0% { transform: translateX(-105%); }
            100% { transform: translateX(105%); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .jupiter { width: 90px; height: 90px; }
            .earth { width: 65px; height: 65px; }
            .moon { width: 45px; height: 45px; }
            .cursor-glow { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>
<!-- 粒子画布：星辰大海 -->
<canvas id="particle-canvas"></canvas>

<!-- 动态 UI 层 -->
<div class="hero-grid">
    <!-- 星云光斑 -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <!-- 行星：木星、地球、月球 -->
    <div class="planet jupiter"></div>
    <div class="planet earth"></div>
    <div class="planet moon"></div>

    <!-- 星光小点 -->
    <div class="star-dot dot-1"></div>
    <div class="star-dot dot-2"></div>
    <div class="star-dot dot-3"></div>

    <!-- 滑动的星轨光线 -->
    <div class="star-trail"></div>
    <div class="star-trail star-trail-2"></div>

    <!-- 鼠标跟随光晕 -->
    <div class="cursor-glow" id="cursorGlow"></div>
</div>

<script>
    (function() {
        // ==================== 宇宙粒子系统 ====================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let mouse = { x: -1000, y: -1000 };

        const PARTICLE_COUNT = 200;
        const CONNECTION_DISTANCE = 100;
        const PARTICLE_SPEED = 0.4;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                this.x = Math.random() * width;
                this.y = Math.random() * height;
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * PARTICLE_SPEED;
                this.vy = (Math.random() - 0.5) * PARTICLE_SPEED;
                this.radius = Math.random() * 1.8 + 0.3;
                const colors = [
                    '200, 220, 255',
                    '225, 210, 255',
                    '255, 240, 220',
                    '180, 200, 230',
                    '210, 190, 220',
                    '190, 210, 240'
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.8 + 0.2;
                this.twinkleSpeed = Math.random() * 0.02 + 0.005;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.x += this.vx;
                this.y += this.vy;

                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 130) {
                    let angle = Math.atan2(dy, dx);
                    let force = (130 - dist) / 130;
                    this.vx += Math.cos(angle) * force * 0.15;
                    this.vy += Math.sin(angle) * force * 0.15;
                }

                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > PARTICLE_SPEED * 1.8) {
                    this.vx = (this.vx / speed) * PARTICLE_SPEED * 1.8;
                    this.vy = (this.vy / speed) * PARTICLE_SPEED * 1.8;
                }

                if (this.x < -30) this.x = width + 30;
                if (this.x > width + 30) this.x = -30;
                if (this.y < -30) this.y = height + 30;
                if (this.y > height + 30) this.y = -30;
            }

            draw(time) {
                let twinkle = Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                let currentOpacity = this.opacity * twinkle;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity})`;
                ctx.fill();

                if (this.radius > 1.3) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color}, ${currentOpacity * 0.12})`;
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONNECTION_DISTANCE) {
                        let opacity = 1 - dist / CONNECTION_DISTANCE;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.07})`;
                        ctx.lineWidth = 0.4;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate(time) {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update(time);
                particles[i].draw(time);
            }

            drawConnections();
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        // ==================== 鼠标交互逻辑 ====================
        const cursorGlow = document.getElementById('cursorGlow');

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            if (cursorGlow) {
                cursorGlow.style.left = e.clientX + 'px';
                cursorGlow.style.top = e.clientY + 'px';
                cursorGlow.style.opacity = '1';
            }

            // 视差效果：星云与行星随鼠标轻微移动
            const nebulaElements = document.querySelectorAll('.nebula');
            const planetElements = document.querySelectorAll('.planet');
            const starDots = document.querySelectorAll('.star-dot');

            const moveX = (e.clientX - window.innerWidth / 2) / window.innerWidth;
            const moveY = (e.clientY - window.innerHeight / 2) / window.innerHeight;

            nebulaElements.forEach((el, index) => {
                let depth = 12 + index * 3;
                el.style.transform = `translate(${moveX * depth}px, ${moveY * depth}px)`;
            });

            planetElements.forEach((el, index) => {
                let depth = 20 + index * 6;
                el.style.transform = `translate(${moveX * depth}px, ${moveY * depth}px)`;
            });

            starDots.forEach((el, index) => {
                let depth = 10 + index * 2;
                el.style.transform = `translate(${moveX * depth}px, ${moveY * depth}px)`;
            });
        });

        document.addEventListener('mouseleave', () => {
            mouse.x = -1000;
            mouse.y = -1000;
            if (cursorGlow) cursorGlow.style.opacity = '0';

            document.querySelectorAll('.nebula, .planet, .star-dot').forEach(el => {
                el.style.transform = 'translate(0px, 0px)';
            });
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
                if (cursorGlow) {
                    cursorGlow.style.left = e.touches[0].clientX + 'px';
                    cursorGlow.style.top = e.touches[0].clientY + 'px';
                    cursorGlow.style.opacity = '1';
                }
            }
        }, { passive: true });

        document.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
            if (cursorGlow) cursorGlow.style.opacity = '0';
        });

    })();
</script>
</body>
</html>
